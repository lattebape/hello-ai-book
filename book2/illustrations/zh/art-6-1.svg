    <path d="M -40 4 q 20 -6 34 -3 M -36 9 q 18 -5 30 -3" stroke="#DCD2C0" stroke-width="2.4" fill="none" stroke-linecap="round"/>
  </g>

  <!-- 小悠：伏案听讲 -->
  <g transform="translate(430,352)">
    <rect x="-30" y="-96" width="60" height="88" rx="24" fill="#F7C64B"/>
    <path d="M -30 -70 L -74 -36" stroke="#F7C64B" stroke-width="13" stroke-linecap="round"/>
    <circle cx="-79" cy="-32" r="7" fill="#FFCFA8"/>
    <path d="M 30 -70 L 60 -40" stroke="#F7C64B" stroke-width="13" stroke-linecap="round"/>
    <circle cx="64" cy="-36" r="7" fill="#FFCFA8"/>
    <circle cy="-130" r="34" fill="#FFCFA8"/>
    <path d="M -34 -130 a 34 34 0 0 1 68 0 l 0 8 q -8 -8 -16 -4 q -8 -9 -18 -3 q -10 -8 -18 2 q -8 -5 -16 5 z" fill="#2E2A28"/>
    <circle cx="-12" cy="-121" r="3" fill="#2E2A28"/>
    <circle cx="12" cy="-121" r="3" fill="#2E2A28"/>
    <path d="M -8 -111 q 8 7 16 0" stroke="#2E2A28" stroke-width="2.4" fill="none" stroke-linecap="round"/>
    <ellipse cx="-22" cy="-113" rx="5" ry="3.4" fill="#F7A98C" opacity="0.55"/>
    <ellipse cx="22" cy="-113" rx="5" ry="3.4" fill="#F7A98C" opacity="0.55"/>
  </g>

  <!-- 小白板：问号与灯泡 -->
  <g transform="translate(700,238)">
    <rect x="-84" y="-70" width="168" height="128" rx="10" fill="#FFFFFF" stroke="#C98F4E" stroke-width="5"/>
    <rect x="-10" y="58" width="20" height="70" rx="8" fill="#C98F4E"/>
    <text x="-34" y="14" text-anchor="middle" font-size="52" font-weight="800" fill="#4A90D9">?</text>
    <g transform="translate(38,-4)">
      <circle r="20" fill="#F7C64B"/>
      <circle cy="-2" r="9" fill="#FFF7E6"/>
      <rect x="-5" y="14" width="10" height="8" rx="3" fill="#8A7F72"/>
      <path d="M 0 -20 v -9 M 15 -14 l 7 -7 M -15 -14 l -7 -7" stroke="#F2A65A" stroke-width="3" stroke-linecap="round"/>
    </g>
  </g>

  <!-- 泡泡：眼镜＋教鞭 -->
  <g transform="translate(590,220)">
    <ellipse rx="36" ry="32" fill="#FFFFFF" stroke="#E0D6C6" stroke-width="2.5"/>
    <ellipse cy="-2" rx="22" ry="16" fill="#CFE9F8"/>
    <circle cx="-8" cy="-4" r="7" fill="none" stroke="#3D3229" stroke-width="2.4"/>
    <circle cx="9" cy="-4" r="7" fill="none" stroke="#3D3229" stroke-width="2.4"/>
    <line x1="-1" y1="-4" x2="2" y2="-4" stroke="#3D3229" stroke-width="2.4"/>
    <circle cx="-8" cy="-4" r="2.2" fill="#2C6E9E"/>
    <circle cx="9" cy="-4" r="2.2" fill="#2C6E9E"/>
    <path d="M -4 6 q 4 3 9 0" stroke="#2C6E9E" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <line y1="-32" y2="-45" stroke="#B9AFA0" stroke-width="3" stroke-linecap="round"/>
    <circle cy="-50" r="5" fill="#F59E0B"/>
    <circle cx="-42" cy="10" r="8" fill="#FFFFFF" stroke="#E0D6C6" stroke-width="2.5"/>
    <g transform="translate(40,4)">
      <circle r="8" fill="#FFFFFF" stroke="#E0D6C6" stroke-width="2.5"/>
      <line x1="6" y1="-6" x2="52" y2="-34" stroke="#C98F4E" stroke-width="5" stroke-linecap="round"/>
      <circle cx="55" cy="-36" r="4" fill="#E8734A"/>
    </g>
