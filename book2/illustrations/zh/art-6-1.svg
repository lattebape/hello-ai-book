<svg viewBox="0 0 900 480" xmlns="http://www.w3.org/2000/svg" font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei','Noto Sans SC',sans-serif">
  <rect width="900" height="480" fill="#FAF6EF"/>
  <ellipse cx="450" cy="444" rx="380" ry="24" fill="#F1E7D6"/>

  <!-- 书桌 -->
  <rect x="120" y="330" width="500" height="20" rx="9" fill="#D9A05B"/>
  <rect x="150" y="350" width="18" height="90" rx="7" fill="#C98F4E"/>
  <rect x="572" y="350" width="18" height="90" rx="7" fill="#C98F4E"/>

  <!-- 台灯与光晕 -->
  <g transform="translate(200,330)">
    <rect x="-28" y="-12" width="56" height="12" rx="6" fill="#8A7F72"/>
    <path d="M 0 -12 L -14 -86 L 26 -120" stroke="#8A7F72" stroke-width="8" fill="none" stroke-linecap="round"/>
    <path d="M 12 -132 a 26 22 0 0 1 40 24 z" fill="#F59E0B" transform="rotate(6 32 -120)"/>
    <path d="M 40 -104 L 150 -10 L 60 -10 Z" fill="#FFF3D6" opacity="0.65"/>
  </g>

  <!-- 笔记本 -->
  <g transform="translate(330,320)">
