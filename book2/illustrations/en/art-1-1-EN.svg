<svg viewBox="0 0 900 480" xmlns="http://www.w3.org/2000/svg" font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei','Noto Sans SC',sans-serif">
  <rect width="900" height="480" fill="#FAF6EF"/>
  <ellipse cx="450" cy="442" rx="380" ry="24" fill="#F1E7D6"/>

  <!-- 沙发 -->
  <g transform="translate(360,340)">
    <rect x="-190" y="-70" width="380" height="120" rx="26" fill="#8BB0A0"/>
    <rect x="-230" y="-90" width="70" height="150" rx="24" fill="#7BA292"/>
