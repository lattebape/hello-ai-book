    <path d="M -30 -76 L -56 -50" stroke="#F7C64B" stroke-width="13" stroke-linecap="round"/>
    <circle cx="-60" cy="-46" r="7" fill="#FFCFA8"/>
    <circle cx="66" cy="-48" r="7" fill="#FFCFA8"/>
