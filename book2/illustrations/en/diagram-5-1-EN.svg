<svg viewBox="0 0 960 460" xmlns="http://www.w3.org/2000/svg" font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei','Noto Sans SC',sans-serif">
  <rect width="960" height="460" fill="#FAF6EF"/>
  <text x="480" y="46" text-anchor="middle" font-size="24" font-weight="700" fill="#3D3229">Long Docs in Three Steps: It Finds the Needle, You Check It</text>
  <text x="480" y="72" text-anchor="middle" font-size="13.5" fill="#9A8F80">Figure 5-1 | Save the searching, never the checking</text>

  <path d="M 322 240 h 24" stroke="#C9BCA6" stroke-width="4" stroke-linecap="round"/><polygon points="354,240 340,233 340,247" fill="#C9BCA6"/>
  <path d="M 614 240 h 24" stroke="#C9BCA6" stroke-width="4" stroke-linecap="round"/><polygon points="646,240 632,233 632,247" fill="#C9BCA6"/>

  <!-- 步骤1 -->
  <rect x="62" y="120" width="260" height="242" rx="18" fill="#FFFFFF" stroke="#4A90D9" stroke-width="3"/>
  <circle cx="192" cy="176" r="26" fill="#4A90D9"/>
  <rect x="180" y="164" width="24" height="30" rx="3" fill="#FFFFFF" transform="rotate(-6 192 179)"/>
  <path d="M 185 172 h 14 M 185 179 h 11 M 185 186 h 14" stroke="#4A90D9" stroke-width="2" stroke-linecap="round"/>
  <text x="192" y="238" text-anchor="middle" font-size="17" font-weight="700" fill="#2C6E9E">1. Get the map</text>
  <text x="192" y="272" text-anchor="middle" font-size="12.5" fill="#8A7F72">"Sum it up in ten</text>
  <text x="192" y="294" text-anchor="middle" font-size="12.5" fill="#8A7F72">sentences; list the structure"</text>
  <text x="192" y="330" text-anchor="middle" font-size="12" fill="#B9AFA0">Bird's-eye first, then dive</text>

  <!-- 步骤2 -->
  <rect x="354" y="120" width="260" height="242" rx="18" fill="#FFFFFF" stroke="#F59E0B" stroke-width="3"/>
  <g transform="translate(484,176)">
    <circle r="26" fill="#F59E0B"/>
    <circle cx="-4" cy="-4" r="10" fill="none" stroke="#FFFFFF" stroke-width="3.4"/>
    <line x1="4" y1="4" x2="14" y2="14" stroke="#FFFFFF" stroke-width="3.6" stroke-linecap="round"/>
  </g>
  <text x="484" y="238" text-anchor="middle" font-size="17" font-weight="700" fill="#B45309">2. Dig with questions</text>
  <text x="484" y="272" text-anchor="middle" font-size="12.5" fill="#8A7F72">"On the point I care about,</text>
  <text x="484" y="294" text-anchor="middle" font-size="12.5" fill="#8A7F72">point me to the source text"</text>
  <text x="484" y="330" text-anchor="middle" font-size="12" fill="#B9AFA0">A guide, not a megaphone</text>

  <!-- 步骤3 黄灯 -->
  <rect x="646" y="120" width="260" height="242" rx="18" fill="#FFFFFF" stroke="#E8734A" stroke-width="3.5"/>
  <g transform="translate(776,176)">
    <circle r="26" fill="#E8734A"/>
    <path d="M -10 -2 l 7 8 l 14 -16" stroke="#FFFFFF" stroke-width="3.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="776" y="238" text-anchor="middle" font-size="17" font-weight="700" fill="#B4472A">3. Verify at the source</text>
  <text x="776" y="272" text-anchor="middle" font-size="12.5" fill="#8A7F72">Key conclusions: open the</text>
  <text x="776" y="294" text-anchor="middle" font-size="12.5" fill="#8A7F72">original, see for yourself</text>
  <rect x="672" y="312" width="208" height="32" rx="12" fill="#FDF3DC"/>
  <text x="776" y="333" text-anchor="middle" font-size="12" fill="#B45309">Yellow-light step — no skipping</text>

  <text x="480" y="424" text-anchor="middle" font-size="13.5" fill="#9A8F80">A dropped "not" or a wrong digit is easy to miss — once the needle is found, check it with your own eyes</text>
</svg>
