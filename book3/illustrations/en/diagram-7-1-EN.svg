<svg viewBox="0 0 960 560" xmlns="http://www.w3.org/2000/svg" font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei','Noto Sans SC',sans-serif">
  <rect width="960" height="560" fill="#FAF6EF"/>
  <text x="480" y="46" text-anchor="middle" font-size="24" font-weight="700" fill="#3D3229">Three Directions Already on the Road</text>
  <text x="480" y="72" text-anchor="middle" font-size="13.5" fill="#9A8F80">Figure 7-1 | Not prophecy — a traffic report</text>

  <text x="440" y="112" text-anchor="middle" font-size="13.5" font-weight="700" fill="#3E7D4B">Can already</text>
  <text x="770" y="112" text-anchor="middle" font-size="13.5" font-weight="700" fill="#B45309">Can't yet</text>

  <!-- 行1 智能体 -->
  <g>
    <rect x="60" y="128" width="200" height="120" rx="16" fill="#FFFFFF" stroke="#4A90D9" stroke-width="3"/>
    <g transform="translate(120,172)">
      <rect x="-20" y="-18" width="40" height="34" rx="8" fill="#4A90D9"/>
      <circle cx="-8" cy="-4" r="3.4" fill="#FFFFFF"/><circle cx="8" cy="-4" r="3.4" fill="#FFFFFF"/>
      <path d="M -7 7 h 14" stroke="#FFFFFF" stroke-width="2.6" stroke-linecap="round"/>
      <line y1="-18" y2="-27" stroke="#4A90D9" stroke-width="3"/>
      <circle cy="-30" r="3.6" fill="#F59E0B"/>
      <path d="M 20 4 h 16 l 6 -8" stroke="#4A90D9" stroke-width="3.4" fill="none" stroke-linecap="round"/>
    </g>
    <text x="160" y="230" text-anchor="middle" font-size="16" font-weight="700" fill="#2C6E9E">Agents</text>
    <rect x="292" y="128" width="296" height="120" rx="16" fill="#EAF4EB"/>
    <text x="312" y="164" font-size="12.5" fill="#3E7D4B">Give it a goal: it breaks down steps,</text>
    <text x="312" y="188" font-size="12.5" fill="#3E7D4B">researches, executes — a decent intern</text>
    <rect x="620" y="128" width="296" height="120" rx="16" fill="#FDF3DC"/>
    <text x="640" y="164" font-size="12.5" fill="#B45309">Full autonomy: it errs without noticing,</text>
    <text x="640" y="188" font-size="12.5" fill="#B45309">errors snowball. More power = more checks</text>
  </g>

  <!-- 行2 机器人 -->
  <g>
    <rect x="60" y="272" width="200" height="120" rx="16" fill="#FFFFFF" stroke="#5FA968" stroke-width="3"/>
    <g transform="translate(120,316)">
      <rect x="-18" y="-20" width="36" height="30" rx="8" fill="#5FA968"/>
      <circle cx="-7" cy="-8" r="3.2" fill="#FFFFFF"/><circle cx="8" cy="-8" r="3.2" fill="#FFFFFF"/>
      <rect x="-13" y="10" width="10" height="14" rx="4" fill="#3E7D4B"/>
      <rect x="4" y="10" width="10" height="14" rx="4" fill="#3E7D4B"/>
      <path d="M -18 -6 h -10 M 18 -6 h 10" stroke="#3E7D4B" stroke-width="4" stroke-linecap="round"/>
    </g>
    <text x="160" y="374" text-anchor="middle" font-size="16" font-weight="700" fill="#3E7D4B">Robots</text>
    <rect x="292" y="272" width="296" height="120" rx="16" fill="#EAF4EB"/>
    <text x="312" y="308" font-size="12.5" fill="#3E7D4B">Repetition in tidy environments:</text>
    <text x="312" y="332" font-size="12.5" fill="#3E7D4B">sorting, delivery, cleaning — steady</text>
    <rect x="620" y="272" width="296" height="120" rx="16" fill="#FDF3DC"/>
    <text x="640" y="308" font-size="12.5" fill="#B45309">Fine work in the messy real world —</text>
    <text x="640" y="332" font-size="12.5" fill="#B45309">Moravec's paradox is still on duty</text>
  </g>

  <!-- 行3 科学助手 -->
  <g>
    <rect x="60" y="416" width="200" height="120" rx="16" fill="#FFFFFF" stroke="#8B6FC0" stroke-width="3"/>
    <g transform="translate(120,460)">
      <path d="M -8 -26 h 16 v 16 l 14 24 a 8 8 0 0 1 -7 12 h -30 a 8 8 0 0 1 -7 -12 l 14 -24 z" fill="none" stroke="#8B6FC0" stroke-width="3.4" stroke-linejoin="round"/>
      <path d="M -12 8 h 24 l 6 10 h -36 z" fill="#8B6FC0"/>
      <circle cx="-2" cy="2" r="2.6" fill="#8B6FC0"/>
    </g>
    <text x="160" y="518" text-anchor="middle" font-size="16" font-weight="700" fill="#8B6FC0">Science assistant</text>
    <rect x="292" y="416" width="296" height="120" rx="16" fill="#EAF4EB"/>
    <text x="312" y="452" font-size="12.5" fill="#3E7D4B">Sifts vast possibility spaces: proteins,</text>
    <text x="312" y="476" font-size="12.5" fill="#3E7D4B">materials, scans — years shrink to weeks</text>
    <rect x="620" y="416" width="296" height="120" rx="16" fill="#FDF3DC"/>
    <text x="640" y="452" font-size="12.5" fill="#B45309">It can't pose the scientist's questions</text>
    <text x="640" y="476" font-size="12.5" fill="#B45309">— an accelerator, not a discoverer</text>
  </g>
</svg>
