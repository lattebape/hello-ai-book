<svg viewBox="0 0 960 500" xmlns="http://www.w3.org/2000/svg" font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei','Noto Sans SC',sans-serif">
  <rect width="960" height="500" fill="#FAF6EF"/>
  <text x="480" y="46" text-anchor="middle" font-size="24" font-weight="700" fill="#3D3229">The Three-Question Check</text>
  <text x="480" y="72" text-anchor="middle" font-size="13.5" fill="#9A8F80">Figure 4-1 | Fail any one question — don't forward yet</text>

  <!-- 卡1 来源 -->
  <rect x="60" y="104" width="256" height="310" rx="20" fill="#FFFFFF" stroke="#4A90D9" stroke-width="3"/>
  <g transform="translate(188,180)">
    <circle r="34" fill="#EAF3FB"/>
    <circle cx="-3" cy="-4" r="13" fill="none" stroke="#4A90D9" stroke-width="4.2"/>
    <line x1="7" y1="7" x2="20" y2="20" stroke="#4A90D9" stroke-width="4.5" stroke-linecap="round"/>
  </g>
  <text x="188" y="256" text-anchor="middle" font-size="18" font-weight="700" fill="#2C6E9E">1. Who's the source?</text>
  <text x="188" y="296" text-anchor="middle" font-size="12.5" fill="#8A7F72">Real outlet or official account,</text>
  <text x="188" y="318" text-anchor="middle" font-size="12.5" fill="#8A7F72">or a no-name born yesterday?</text>
  <text x="188" y="376" text-anchor="middle" font-size="12" fill="#B9AFA0">Stories lie; track records rarely do</text>

  <!-- 卡2 孤证 -->
  <rect x="352" y="104" width="256" height="310" rx="20" fill="#FFFFFF" stroke="#F59E0B" stroke-width="3"/>
  <g transform="translate(480,180)">
    <circle r="34" fill="#FDF3DC"/>
    <rect x="-24" y="-14" width="20" height="26" rx="3" fill="#F59E0B"/>
    <rect x="0" y="-18" width="20" height="30" rx="3" fill="#F2C48A"/>
    <path d="M -20 -6 h 12 M -20 0 h 12 M 4 -10 h 12 M 4 -4 h 12 M 4 2 h 12" stroke="#FFFFFF" stroke-width="2.2" stroke-linecap="round"/>
    <text x="0" y="28" text-anchor="middle" font-size="14" font-weight="800" fill="#B45309">×N?</text>
  </g>
  <text x="480" y="256" text-anchor="middle" font-size="18" font-weight="700" fill="#B45309">2. Who else says so?</text>
  <text x="480" y="296" text-anchor="middle" font-size="12.5" fill="#8A7F72">Real news never has one outlet;</text>
  <text x="480" y="318" text-anchor="middle" font-size="12.5" fill="#8A7F72">search — a lone source = doubt</text>
  <text x="480" y="376" text-anchor="middle" font-size="12" fill="#B9AFA0">Wait for a second source</text>

  <!-- 卡3 情绪 -->
  <rect x="644" y="104" width="256" height="310" rx="20" fill="#FFFFFF" stroke="#E8734A" stroke-width="3"/>
  <g transform="translate(772,180)">
    <circle r="34" fill="#FDEDE4"/>
    <path d="M -4 -24 q 14 8 8 22 q 12 -2 12 12 a 16 16 0 0 1 -32 4 a 14 18 0 0 1 4 -30 q 4 -5 8 -8 z" fill="#E8734A"/>
    <path d="M -2 6 a 8 8 0 0 0 12 6" stroke="#FFF3D6" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>
  <text x="772" y="256" text-anchor="middle" font-size="18" font-weight="700" fill="#B4472A">3. Feelings too tasty?</text>
  <text x="772" y="296" text-anchor="middle" font-size="12.5" fill="#8A7F72">The angrier or more scared it</text>
  <text x="772" y="318" text-anchor="middle" font-size="12.5" fill="#8A7F72">makes you, the slower you go</text>
  <text x="772" y="376" text-anchor="middle" font-size="12" fill="#B9AFA0">Real news survives your calm</text>

  <text x="480" y="464" text-anchor="middle" font-size="13.5" fill="#9A8F80">Two habits underneath: wait ten minutes before forwarding; verify big things through official channels</text>
</svg>
