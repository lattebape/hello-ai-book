<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei','Noto Sans SC',sans-serif">
  <rect width="900" height="500" fill="#FAF6EF"/>
  <text x="450" y="46" text-anchor="middle" font-size="24" font-weight="700" fill="#3D3229">顺口，不等于真话</text>
  <text x="450" y="72" text-anchor="middle" font-size="13.5" fill="#9A8F80">示意图 6-1 ｜ 接龙只走"最顺"的那条路</text>

  <!-- 主路与岔路 -->
  <path d="M 60 300 L 380 300 Q 430 300 470 260 L 700 160" stroke="#EADFCC" stroke-width="44" fill="none" stroke-linecap="round"/>
  <path d="M 380 300 Q 430 300 470 340 L 700 430" stroke="#EADFCC" stroke-width="38" fill="none" stroke-linecap="round" stroke-dasharray="26 20"/>
  <path d="M 60 300 L 360 300" stroke="#DCD2C0" stroke-width="4" stroke-dasharray="14 14"/>

  <!-- 上路：最顺的话（灯亮） -->
  <rect x="700" y="96" width="150" height="46" rx="12" fill="#FFF3D6" stroke="#F59E0B" stroke-width="3"/>
  <text x="775" y="126" text-anchor="middle" font-size="17" font-weight="700" fill="#B45309">最顺的话</text>
  <line x1="560" y1="240" x2="560" y2="170" stroke="#8A7F72" stroke-width="5"/>
  <circle cx="560" cy="160" r="14" fill="#F7C64B"/>
  <ellipse cx="560" cy="200" rx="42" ry="26" fill="#FFE9BC" opacity="0.55"/>

  <!-- 下路：最真的话（空检查亭） -->
  <rect x="700" y="392" width="150" height="46" rx="12" fill="#FFFFFF" stroke="#C9BCA6" stroke-width="2.5"/>
  <text x="775" y="422" text-anchor="middle" font-size="17" font-weight="700" fill="#8A7F72">最真的话</text>
  <g transform="translate(560,362)">
    <rect x="-34" y="-4" width="68" height="58" rx="8" fill="#FFFFFF" stroke="#C9BCA6" stroke-width="2.5"/>
    <path d="M -42 -4 L 0 -28 L 42 -4 Z" fill="#DCD2C0"/>
    <rect x="-16" y="14" width="32" height="26" rx="4" fill="#F1E7D6"/>
    <text x="0" y="34" text-anchor="middle" font-size="17" fill="#B9AFA0">?</text>
  </g>
  <text x="560" y="450" text-anchor="middle" font-size="12" fill="#9A8F80">检查亭：无人值守</text>

  <!-- 接龙小车驶向上路 -->
  <g transform="translate(370,282) rotate(-10)">
    <path d="M -52 12 q 0 -22 24 -25 l 10 -13 q 22 -11 44 0 l 9 13 q 17 4 17 25 z" fill="#4A90D9"/>
    <path d="M -26 -13 l 8 -10 q 9 -5 18 -3 l 0 13 z" fill="#DFF0FB"/>
    <circle cx="-28" cy="12" r="11" fill="#3D3229"/><circle cx="-28" cy="12" r="4" fill="#8A7F72"/>
    <circle cx="26" cy="12" r="11" fill="#3D3229"/><circle cx="26" cy="12" r="4" fill="#8A7F72"/>
    <g transform="translate(14,-30) scale(0.42)">
      <ellipse rx="38" ry="34" fill="#FFFFFF" stroke="#E0D6C6" stroke-width="3"/>
      <ellipse cy="-2" rx="24" ry="17" fill="#CFE9F8"/>
      <path d="M -13 -5 q 4.5 -5 9 0 M 4 -5 q 4.5 -5 9 0" stroke="#2C6E9E" stroke-width="2.6" fill="none" stroke-linecap="round"/>
      <path d="M -5 4 q 5 4 10 0" stroke="#2C6E9E" stroke-width="2.4" fill="none" stroke-linecap="round"/>
    </g>
  </g>
  <path d="M 250 250 h -44 M 268 226 h -30" stroke="#DCD2C0" stroke-width="4" stroke-linecap="round"/>

  <text x="450" y="482" text-anchor="middle" font-size="13.5" fill="#9A8F80">它选词只看"顺不顺"——通往"真不真"的路口，没有人在检查</text>
</svg>
