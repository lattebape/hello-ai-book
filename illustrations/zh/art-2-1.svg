<svg viewBox="0 0 960 500" xmlns="http://www.w3.org/2000/svg" font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei','Noto Sans SC',sans-serif">
  <rect width="960" height="500" fill="#FAF6EF"/>

  <!-- 时空漩涡 -->
  <path d="M 100 400 Q 480 40 880 320" stroke="#EADFCC" stroke-width="16" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M 60 300 Q 440 120 900 420" stroke="#F1E7D6" stroke-width="12" fill="none" stroke-linecap="round" opacity="0.8"/>

  <!-- 年份气泡 -->
  <circle cx="150" cy="150" r="34" fill="#FFFFFF" stroke="#E0D6C6" stroke-width="2.5"/>
  <text x="150" y="156" text-anchor="middle" font-size="16" font-weight="700" fill="#8A7F72">1950</text>
  <circle cx="300" cy="86" r="30" fill="#FFFFFF" stroke="#E0D6C6" stroke-width="2.5"/>
  <text x="300" y="92" text-anchor="middle" font-size="15" font-weight="700" fill="#8A7F72">1956</text>
  <circle cx="655" cy="90" r="30" fill="#FFFFFF" stroke="#E0D6C6" stroke-width="2.5"/>
  <text x="655" y="96" text-anchor="middle" font-size="15" font-weight="700" fill="#8A7F72">1997</text>
  <circle cx="800" cy="150" r="32" fill="#FFFFFF" stroke="#E0D6C6" stroke-width="2.5"/>
  <text x="800" y="156" text-anchor="middle" font-size="15" font-weight="700" fill="#8A7F72">2016</text>
  <circle cx="878" cy="250" r="36" fill="#FFF3D6" stroke="#F59E0B" stroke-width="3"/>
  <text x="878" y="256" text-anchor="middle" font-size="16" font-weight="700" fill="#E8734A">2022</text>

  <!-- 尾焰 -->
  <path d="M 480 402 q 30 34 0 68 q -30 -34 0 -68" fill="#F59E0B"/>
  <path d="M 480 414 q 18 22 0 44 q -18 -22 0 -44" fill="#F7C64B"/>

  <!-- 时光机主体 -->
  <ellipse cx="480" cy="336" rx="112" ry="80" fill="#F7C64B"/>
  <path d="M 368 336 q -34 6 -40 30 l 44 -6 z" fill="#E8905A"/>
  <path d="M 592 336 q 34 6 40 30 l -44 -6 z" fill="#E8905A"/>
  <circle cx="480" cy="362" r="34" fill="#FFFFFF" stroke="#E0D6C6" stroke-width="3"/>
  <line x1="480" y1="334" x2="480" y2="340" stroke="#C9BCA6" stroke-width="3" stroke-linecap="round"/>
  <line x1="508" y1="362" x2="502" y2="362" stroke="#C9BCA6" stroke-width="3" stroke-linecap="round"/>
  <line x1="480" y1="390" x2="480" y2="384" stroke="#C9BCA6" stroke-width="3" stroke-linecap="round"/>
  <line x1="452" y1="362" x2="458" y2="362" stroke="#C9BCA6" stroke-width="3" stroke-linecap="round"/>
  <line x1="480" y1="362" x2="480" y2="344" stroke="#3D3229" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="480" y1="362" x2="494" y2="368" stroke="#3D3229" stroke-width="3.5" stroke-linecap="round"/>
  <circle cx="480" cy="362" r="3.5" fill="#3D3229"/>
  <circle cx="404" cy="308" r="4" fill="#E8A93B"/>
  <circle cx="556" cy="308" r="4" fill="#E8A93B"/>

  <!-- 玻璃舱盖 -->
  <path d="M 386 316 A 96 74 0 0 1 574 316 Z" fill="#CFE9F8" opacity="0.55" stroke="#A9D3EC" stroke-width="3"/>

  <!-- 舱内：小悠 -->
  <g transform="translate(446,318)">
    <rect x="-22" y="-52" width="44" height="54" rx="16" fill="#F7C64B" stroke="#E8A93B" stroke-width="2"/>
    <path d="M 18 -34 L 40 -58" stroke="#F7C64B" stroke-width="10" stroke-linecap="round"/>
    <circle cx="41" cy="-59" r="5.5" fill="#FFCFA8"/>
    <circle cy="-76" r="23" fill="#FFCFA8"/>
    <path d="M -23 -76 a 23 23 0 0 1 46 0 l 0 5 q -6 -6 -11 -2 q -6 -6 -12 -1 q -7 -6 -12 1 q -5 -3 -11 3 z" fill="#2E2A28"/>
    <circle cx="-8" cy="-70" r="2.2" fill="#2E2A28"/>
    <circle cx="8" cy="-70" r="2.2" fill="#2E2A28"/>
    <path d="M -6 -63 q 6 5 12 0" stroke="#2E2A28" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- 舱内：泡泡 -->
  <g transform="translate(532,296) scale(0.58)">
    <ellipse rx="38" ry="34" fill="#FFFFFF" stroke="#E0D6C6" stroke-width="2.5"/>
    <ellipse cy="-2" rx="24" ry="17" fill="#CFE9F8"/>
    <path d="M -13 -5 q 4.5 -5 9 0" stroke="#2C6E9E" stroke-width="2.4" fill="none" stroke-linecap="round"/>
    <path d="M 4 -5 q 4.5 -5 9 0" stroke="#2C6E9E" stroke-width="2.4" fill="none" stroke-linecap="round"/>
    <path d="M -5 4 q 5 4 10 0" stroke="#2C6E9E" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <line y1="-34" y2="-48" stroke="#B9AFA0" stroke-width="3" stroke-linecap="round"/>
    <circle cy="-53" r="5.5" fill="#F59E0B"/>
  </g>

  <!-- 速度线与星星 -->
  <path d="M 320 250 h -60 M 335 290 h -44 M 640 250 h 60 M 625 290 h 44" stroke="#DCD2C0" stroke-width="4" stroke-linecap="round"/>
  <path d="M 230 360 l 5 -11 l 4 11 l 11 3 l -10 5 l -1 12 l -8 -9 l -12 2 l 7 -9 z" fill="#F2A65A" opacity="0.85"/>
  <path d="M 740 380 l 4 -9 l 3 9 l 9 2 l -8 4 l -1 10 l -6 -7 l -10 1 l 6 -7 z" fill="#F7C64B" opacity="0.9"/>
</svg>
