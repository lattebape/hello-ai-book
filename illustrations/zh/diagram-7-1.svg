<svg viewBox="0 0 900 530" xmlns="http://www.w3.org/2000/svg" font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei','Noto Sans SC',sans-serif">
  <rect width="900" height="530" fill="#FAF6EF"/>
  <text x="450" y="46" text-anchor="middle" font-size="24" font-weight="700" fill="#3D3229">难易跷跷板：人和机器正好相反</text>
  <text x="450" y="72" text-anchor="middle" font-size="13.5" fill="#9A8F80">示意图 7-1 ｜ 莫拉维克悖论——对人最难的，对机器最容易</text>

  <ellipse cx="450" cy="436" rx="220" ry="13" fill="#F1E7D6"/>
  <path d="M 450 328 L 402 424 L 498 424 Z" fill="#8A7F72"/>

  <g transform="translate(450,330) rotate(-12)">
    <rect x="-290" y="-9" width="580" height="18" rx="9" fill="#C98F4E"/>

    <!-- 左端：对人难对机器易 -->
    <rect x="-254" y="-24" width="28" height="14" rx="4" fill="#8B6FC0"/>
    <path d="M -248 -24 Q -252 -44 -240 -48 Q -228 -44 -232 -24 Z" fill="#8B6FC0"/>
    <circle cx="-240" cy="-54" r="9" fill="#8B6FC0"/>

    <rect x="-206" y="-48" width="58" height="38" rx="8" fill="#FFFFFF" stroke="#4A90D9" stroke-width="2.5"/>
    <text x="-177" y="-21" text-anchor="middle" font-size="16" font-weight="700" fill="#4A90D9">√81</text>

    <rect x="-134" y="-44" width="58" height="34" rx="6" fill="#4A90D9"/>
    <rect x="-134" y="-44" width="11" height="34" rx="5" fill="#3A6EA8"/>
    <path d="M -114 -34 h 28 M -114 -26 h 28 M -114 -18 h 22" stroke="#DFF0FB" stroke-width="2.5" stroke-linecap="round"/>

    <!-- 右端：对人易对机器难 -->
    <path d="M 84 -44 L 98 -52 Q 105 -46 112 -52 L 126 -44 L 119 -31 L 112 -34 L 112 -10 L 98 -10 L 98 -34 L 91 -31 Z" fill="#E8734A"/>

    <ellipse cx="180" cy="-11" rx="24" ry="5" fill="#DCD2C0"/>
    <path d="M 162 -42 h 36 v 14 a 18 16 0 0 1 -36 0 z" fill="#F59E0B"/>
    <path d="M 198 -37 q 13 2 11 13 q -2 9 -13 7" stroke="#F59E0B" stroke-width="5" fill="none" stroke-linecap="round"/>

    <rect x="224" y="-54" width="54" height="34" rx="12" fill="#5FA968"/>
    <path d="M 240 -20 L 234 -9 L 252 -20 Z" fill="#5FA968"/>
    <circle cx="240" cy="-37" r="3" fill="#FFFFFF"/>
    <circle cx="251" cy="-37" r="3" fill="#FFFFFF"/>
    <circle cx="262" cy="-37" r="3" fill="#FFFFFF"/>
