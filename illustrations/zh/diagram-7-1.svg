  <text x="205" y="456" text-anchor="middle" font-size="16" font-weight="700" fill="#3D3229">对人难 · 对机器易</text>
  <text x="205" y="480" text-anchor="middle" font-size="12.5" fill="#8A7F72">下盲棋 · 瞬间开方 · 背百科</text>

  <text x="700" y="150" text-anchor="middle" font-size="16" font-weight="700" fill="#3D3229">对人易 · 对机器难</text>
  <text x="700" y="174" text-anchor="middle" font-size="12.5" fill="#8A7F72">叠衬衫 · 听出反话 · 看场合说话</text>

  <text x="450" y="514" text-anchor="middle" font-size="13.5" fill="#9A8F80">"算"是机器的主场；常识，是它没上过的课</text>
</svg>
