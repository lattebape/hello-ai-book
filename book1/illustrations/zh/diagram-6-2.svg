<svg viewBox="0 0 900 480" xmlns="http://www.w3.org/2000/svg" font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei','Noto Sans SC',sans-serif">
  <rect width="900" height="480" fill="#FAF6EF"/>
  <text x="450" y="46" text-anchor="middle" font-size="24" font-weight="700" fill="#3D3229">偏见从哪来</text>
  <text x="450" y="72" text-anchor="middle" font-size="13.5" fill="#9A8F80">示意图 6-2 ｜ 教材偏了，学出来的判断也是偏的（第3章伏笔回收）</text>

  <!-- 天平 -->
  <g transform="translate(450,120)">
    <rect x="-9" y="0" width="18" height="130" rx="8" fill="#8A7F72"/>
    <path d="M -60 130 h 120 l -14 26 h -92 z" fill="#8A7F72"/>
    <g transform="rotate(-11)">
      <line x1="-190" y1="0" x2="190" y2="0" stroke="#8A7F72" stroke-width="9" stroke-linecap="round"/>
      <line x1="-170" y1="0" x2="-170" y2="34" stroke="#B9AFA0" stroke-width="4"/>
      <line x1="170" y1="0" x2="170" y2="34" stroke="#B9AFA0" stroke-width="4"/>
      <path d="M -218 36 a 48 30 0 0 0 96 0 z" fill="#D9A05B"/>
      <path d="M 122 36 a 48 30 0 0 0 96 0 z" fill="#D9A05B"/>
      <!-- 左盘：满满的橘色卡片 -->
      <g stroke="#E8905A" stroke-width="2">
        <rect x="-212" y="18" width="40" height="20" rx="4" fill="#F2A65A"/>
        <rect x="-168" y="16" width="40" height="20" rx="4" fill="#F2A65A"/>
        <rect x="-196" y="-4" width="40" height="20" rx="4" fill="#F2A65A"/>
        <rect x="-152" y="-6" width="40" height="20" rx="4" fill="#F2A65A"/>
        <rect x="-184" y="-26" width="40" height="20" rx="4" fill="#F2A65A"/>
        <rect x="-206" y="-46" width="40" height="20" rx="4" fill="#F2A65A"/>
        <rect x="-160" y="-48" width="40" height="20" rx="4" fill="#F2A65A"/>
      </g>
      <!-- 右盘：稀少的灰卡片 -->
      <rect x="146" y="16" width="40" height="20" rx="4" fill="#DCD2C0" stroke="#C9BCA6" stroke-width="2"/>
      <rect x="172" y="-4" width="40" height="20" rx="4" fill="#DCD2C0" stroke="#C9BCA6" stroke-width="2"/>
    </g>
  </g>
  <text x="240" y="310" text-anchor="middle" font-size="14" fill="#8A7F72">教材里某一类例子特别多</text>
  <text x="668" y="310" text-anchor="middle" font-size="14" fill="#8A7F72">另一类寥寥无几</text>

  <path d="M 450 306 L 450 344" stroke="#C9BCA6" stroke-width="3.5" stroke-dasharray="7 7"/>
  <polygon points="450,352 443,338 457,338" fill="#C9BCA6"/>

  <g transform="translate(450,398) rotate(-8)">
    <rect x="-92" y="-26" width="184" height="52" rx="26" fill="#FFFFFF" stroke="#E0D6C6" stroke-width="3"/>
    <text y="8" text-anchor="middle" font-size="18" font-weight="700" fill="#E8905A">倾斜的模型</text>
  </g>
  <text x="450" y="462" text-anchor="middle" font-size="13.5" fill="#9A8F80">偏见不是 AI 的发明，它是人类偏见的回声——只是经过了放大器</text>
</svg>
