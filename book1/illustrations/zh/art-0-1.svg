    <path d="M -8 -107 q 8 7 16 0" stroke="#2E2A28" stroke-width="2.4" fill="none" stroke-linecap="round"/>
    <ellipse cx="-22" cy="-109" rx="5" ry="3.4" fill="#F7A98C" opacity="0.55"/>
    <ellipse cx="22" cy="-109" rx="5" ry="3.4" fill="#F7A98C" opacity="0.55"/>
  </g>

  <!-- 书桌 -->
  <rect x="150" y="330" width="600" height="26" rx="13" fill="#D9A05B"/>
  <rect x="190" y="356" width="22" height="112" rx="8" fill="#C98F4E"/>
  <rect x="688" y="356" width="22" height="112" rx="8" fill="#C98F4E"/>

  <!-- 手臂搭在桌上 -->
  <path d="M 278 300 L 330 324" stroke="#F7C64B" stroke-width="14" stroke-linecap="round"/>
  <circle cx="336" cy="326" r="8" fill="#FFCFA8"/>
  <path d="M 322 300 L 386 322" stroke="#F7C64B" stroke-width="14" stroke-linecap="round"/>
  <circle cx="392" cy="324" r="8" fill="#FFCFA8"/>

  <!-- 摊开的书 -->
  <path d="M 420 326 L 420 290 Q 465 300 508 290 L 508 326 Q 465 316 420 326 Z" fill="#FFFFFF" stroke="#E0D6C6" stroke-width="2.5"/>
  <path d="M 508 326 L 508 290 Q 553 300 596 290 L 596 326 Q 553 316 508 326 Z" fill="#FFFFFF" stroke="#E0D6C6" stroke-width="2.5"/>
  <line x1="508" y1="290" x2="508" y2="326" stroke="#E0D6C6" stroke-width="2.5"/>
  <path d="M 434 302 h 56 M 434 312 h 44 M 524 302 h 56 M 524 312 h 44" stroke="#DCD2C0" stroke-width="3" stroke-linecap="round"/>

