  <path d="M 720 88 L 720 74 M 758 100 L 768 90 M 770 135 L 784 135 M 758 170 L 768 180 M 682 100 L 672 90 M 670 135 L 656 135" stroke="#F7C64B" stroke-width="4" stroke-linecap="round"/>

  <ellipse cx="440" cy="478" rx="330" ry="26" fill="#F1E7D6"/>

  <!-- 小悠（上半身，先画，桌子随后遮挡） -->
  <g transform="translate(300,336)">
    <rect x="-30" y="-92" width="60" height="96" rx="24" fill="#F7C64B"/>
    <circle cy="-126" r="34" fill="#FFCFA8"/>
