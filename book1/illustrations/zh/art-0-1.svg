  <rect x="636" y="298" width="34" height="30" rx="7" fill="#E8734A"/>
  <path d="M 670 306 q 14 4 0 16" stroke="#E8734A" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M 646 288 q 5 -8 0 -16 M 660 288 q 5 -8 0 -16" stroke="#C9BCA6" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.8"/>

