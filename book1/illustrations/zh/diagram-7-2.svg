<svg viewBox="0 0 960 548" xmlns="http://www.w3.org/2000/svg" font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei','Noto Sans SC',sans-serif">
  <rect width="960" height="548" fill="#FAF6EF"/>
  <text x="480" y="46" text-anchor="middle" font-size="24" font-weight="700" fill="#3D3229">一张任务红绿灯</text>
  <text x="480" y="72" text-anchor="middle" font-size="13.5" fill="#9A8F80">示意图 7-2 ｜ 哪些放手交给它，哪些自己握紧</text>

  <!-- 绿灯 -->
  <rect x="42" y="104" width="272" height="368" rx="18" fill="#FFFFFF" stroke="#5FA968" stroke-width="3"/>
  <rect x="62" y="122" width="232" height="52" rx="26" fill="#EAF4EB"/>
  <circle cx="90" cy="148" r="15" fill="#5FA968"/>
  <path d="M 82 148 l 6 7 l 11 -13" stroke="#FFFFFF" stroke-width="3.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="114" y="155" font-size="16.5" font-weight="700" fill="#3E7D4B">绿灯 · 放心交给它</text>
  <g font-size="14" fill="#3D3229">
    <circle cx="80" cy="209" r="4" fill="#5FA968"/><text x="96" y="214">打草稿、出初稿</text>
    <circle cx="80" cy="247" r="4" fill="#5FA968"/><text x="96" y="252">头脑风暴出点子</text>
    <circle cx="80" cy="285" r="4" fill="#5FA968"/><text x="96" y="290">改写与润色</text>
    <circle cx="80" cy="323" r="4" fill="#5FA968"/><text x="96" y="328">翻译</text>
    <circle cx="80" cy="361" r="4" fill="#5FA968"/><text x="96" y="366">把长文变短</text>
  </g>
  <line x1="62" y1="396" x2="294" y2="396" stroke="#EADFCC" stroke-width="1.5"/>
  <text x="178" y="428" text-anchor="middle" font-size="12" fill="#8A7F72">共同点：好坏一眼可辨，错了不疼</text>

  <!-- 黄灯 -->
  <rect x="344" y="104" width="272" height="368" rx="18" fill="#FFFFFF" stroke="#F59E0B" stroke-width="3"/>
  <rect x="364" y="122" width="232" height="52" rx="26" fill="#FDF3DC"/>
  <circle cx="392" cy="148" r="15" fill="#F59E0B"/>
  <rect x="389" y="138" width="6" height="13" rx="3" fill="#FFFFFF"/>
  <circle cx="392" cy="157" r="3" fill="#FFFFFF"/>
  <text x="416" y="155" font-size="16.5" font-weight="700" fill="#B45309">黄灯 · 盯着点用</text>
  <g font-size="14" fill="#3D3229">
    <circle cx="382" cy="209" r="4" fill="#F59E0B"/><text x="398" y="214">查事实和数据</text>
    <circle cx="382" cy="247" r="4" fill="#F59E0B"/><text x="398" y="252">陌生领域的入门</text>
    <circle cx="382" cy="285" r="4" fill="#F59E0B"/><text x="398" y="290">代读长材料并总结</text>
  </g>
  <line x1="364" y1="396" x2="596" y2="396" stroke="#EADFCC" stroke-width="1.5"/>
  <text x="480" y="428" text-anchor="middle" font-size="12" fill="#8A7F72">共同点：大概率对，错了难发现</text>

  <!-- 红灯 -->
  <rect x="646" y="104" width="272" height="368" rx="18" fill="#FFFFFF" stroke="#E8734A" stroke-width="3"/>
  <rect x="666" y="122" width="232" height="52" rx="26" fill="#FDEDE4"/>
  <circle cx="694" cy="148" r="15" fill="#E8734A"/>
  <path d="M 687 141 L 701 155 M 701 141 L 687 155" stroke="#FFFFFF" stroke-width="3.4" stroke-linecap="round"/>
  <text x="718" y="155" font-size="16.5" font-weight="700" fill="#B4472A">红灯 · 别全托付</text>
  <g font-size="14" fill="#3D3229">
    <circle cx="684" cy="209" r="4" fill="#E8734A"/><text x="700" y="214">医法钱的最终决定</text>
    <circle cx="684" cy="247" r="4" fill="#E8734A"/><text x="700" y="252">涉及安全的操作</text>
    <circle cx="684" cy="285" r="4" fill="#E8734A"/><text x="700" y="290">替你做人生选择</text>
  </g>
  <line x1="666" y1="396" x2="898" y2="396" stroke="#EADFCC" stroke-width="1.5"/>
  <text x="782" y="428" text-anchor="middle" font-size="12" fill="#8A7F72">共同点：代价大，责任无法外包</text>

  <text x="480" y="522" text-anchor="middle" font-size="13.5" fill="#9A8F80">口诀：越好核验、错了越不疼，越可以放手；越难核验、错了越疼，越要自己握着</text>
</svg>
