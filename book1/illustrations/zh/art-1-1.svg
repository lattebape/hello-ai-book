<svg viewBox="0 0 960 480" xmlns="http://www.w3.org/2000/svg" font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei','Noto Sans SC',sans-serif">
  <rect width="960" height="480" fill="#FAF6EF"/>

  <!-- 晨光 -->
  <polygon points="960,0 700,0 960,230" fill="#FFE9BC" opacity="0.55"/>
  <polygon points="960,60 780,0 960,300" fill="#FFE3A8" opacity="0.4"/>
  <path d="M 905 40 Q 932 140 905 240 Q 932 340 905 440 L 960 440 L 960 40 Z" fill="#F2A65A" opacity="0.9"/>

  <!-- 床头板与枕头 -->
  <rect x="90" y="150" width="180" height="190" rx="18" fill="#D9A05B"/>
  <ellipse cx="205" cy="322" rx="72" ry="26" fill="#FFFFFF" stroke="#E0D6C6" stroke-width="2.5"/>

  <!-- 小悠（上半身，从被子里坐起） -->
  <g transform="translate(300,338)">
    <rect x="-30" y="-88" width="60" height="92" rx="24" fill="#F7C64B"/>
    <path d="M 28 -70 L 88 -122" stroke="#F7C64B" stroke-width="14" stroke-linecap="round"/>
    <circle cx="92" cy="-126" r="8" fill="#FFCFA8"/>
    <circle cy="-122" r="34" fill="#FFCFA8"/>
    <path d="M -34 -122 a 34 34 0 0 1 68 0 l 0 8 q -8 -8 -16 -4 q -8 -9 -18 -3 q -10 -8 -18 2 q -8 -5 -16 5 z" fill="#2E2A28"/>
    <path d="M 8 -152 q 12 -12 26 -8" stroke="#2E2A28" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M -18 -154 q -8 -10 -18 -8" stroke="#2E2A28" stroke-width="5" fill="none" stroke-linecap="round"/>
    <circle cx="-12" cy="-113" r="3" fill="#2E2A28"/>
    <circle cx="12" cy="-113" r="3" fill="#2E2A28"/>
    <path d="M -8 -103 q 8 7 16 0" stroke="#2E2A28" stroke-width="2.4" fill="none" stroke-linecap="round"/>
    <ellipse cx="-22" cy="-105" rx="5" ry="3.4" fill="#F7A98C" opacity="0.55"/>
    <ellipse cx="22" cy="-105" rx="5" ry="3.4" fill="#F7A98C" opacity="0.55"/>
  </g>

  <!-- 手机（微微倾斜） -->
  <g transform="translate(420,228) rotate(-10)">
    <rect x="-22" y="-40" width="44" height="80" rx="9" fill="#3D3229"/>
    <rect x="-16" y="-33" width="32" height="66" rx="5" fill="#BFE0F5"/>
  </g>

  <!-- 泡泡从手机屏幕里探出上半身 -->
  <g transform="translate(424,168) scale(0.72)">
    <ellipse rx="38" ry="34" fill="#FFFFFF" stroke="#E0D6C6" stroke-width="2.5"/>
    <ellipse cy="-2" rx="24" ry="17" fill="#CFE9F8"/>
    <path d="M -13 -5 q 4.5 -5 9 0" stroke="#2C6E9E" stroke-width="2.4" fill="none" stroke-linecap="round"/>
    <path d="M 4 -5 q 4.5 -5 9 0" stroke="#2C6E9E" stroke-width="2.4" fill="none" stroke-linecap="round"/>
    <path d="M -5 4 q 5 4 10 0" stroke="#2C6E9E" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <line y1="-34" y2="-48" stroke="#B9AFA0" stroke-width="3" stroke-linecap="round"/>
    <circle cy="-53" r="5.5" fill="#F59E0B"/>
    <circle cx="-48" cy="-20" r="8" fill="#FFFFFF" stroke="#E0D6C6" stroke-width="2.5"/>
    <path d="M -64 -36 q -8 8 -6 18" stroke="#C9BCA6" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>

  <!-- 被子 -->
  <rect x="80" y="322" width="700" height="118" rx="26" fill="#F2A65A"/>
  <path d="M 80 352 Q 430 324 780 352" stroke="#E8905A" stroke-width="5" fill="none"/>
  <path d="M 150 392 Q 430 372 720 392" stroke="#E8905A" stroke-width="4" fill="none" opacity="0.7"/>
</svg>
