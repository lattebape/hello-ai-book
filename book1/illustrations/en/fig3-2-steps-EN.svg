<svg viewBox="0 0 960 470" xmlns="http://www.w3.org/2000/svg" font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei','Noto Sans SC',sans-serif">
  <rect width="960" height="470" fill="#FAF6EF"/>
  <text x="480" y="46" text-anchor="middle" font-size="24" font-weight="700" fill="#3D3229">Machine Learning in Three Steps</text>
  <text x="480" y="72" text-anchor="middle" font-size="13.5" fill="#9A8F80">Figure 3-2 | Data is the textbook, training the practice, the model the experience</text>

  <!-- 箭头 -->
  <path d="M 322 230 h 66" stroke="#C9BCA6" stroke-width="4" stroke-linecap="round"/>
  <polygon points="396,230 380,222 380,238" fill="#C9BCA6"/>
  <path d="M 642 230 h 66" stroke="#C9BCA6" stroke-width="4" stroke-linecap="round"/>
  <polygon points="716,230 700,222 700,238" fill="#C9BCA6"/>

  <!-- 数据 -->
  <rect x="82" y="120" width="236" height="220" rx="20" fill="#FFFFFF" stroke="#E0D6C6" stroke-width="3"/>
  <g transform="translate(200,196)">
    <rect x="-52" y="-30" width="88" height="60" rx="8" fill="#EAF3FB" stroke="#4A90D9" stroke-width="2.5" transform="rotate(-6)"/>
    <rect x="-38" y="-38" width="88" height="60" rx="8" fill="#FFFFFF" stroke="#4A90D9" stroke-width="2.5" transform="rotate(4)"/>
    <circle cx="0" cy="-6" r="15" fill="#F2A65A" transform="rotate(4)"/>
    <path d="M -11 -16 L -16 -28 L -4 -22 Z M 11 -16 L 16 -28 L 4 -22 Z" fill="#F2A65A" transform="rotate(4)"/>
    <circle cx="24" cy="18" r="11" fill="#5FA968"/>
    <path d="M 19 18 l 4 4 l 7 -8" stroke="#FFFFFF" stroke-width="2.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="200" y="282" text-anchor="middle" font-size="19" font-weight="700" fill="#4A90D9">Data</text>
  <text x="200" y="308" text-anchor="middle" font-size="13" fill="#8A7F72">Thousands of labeled pictures</text>

  <!-- 训练 -->
  <rect x="402" y="120" width="236" height="220" rx="20" fill="#FFFFFF" stroke="#E0D6C6" stroke-width="3"/>
  <g transform="translate(520,196)">
    <path d="M 30 -18 A 35 35 0 1 0 34 8" stroke="#F59E0B" stroke-width="6" fill="none" stroke-linecap="round"/>
    <polygon points="38,-24 22,-22 32,-8" fill="#F59E0B"/>
    <text x="1" y="8" text-anchor="middle" font-size="20" font-weight="700" fill="#F59E0B">↻</text>
  </g>
  <text x="520" y="282" text-anchor="middle" font-size="19" font-weight="700" fill="#E8905A">Training</text>
  <text x="520" y="308" text-anchor="middle" font-size="13" fill="#8A7F72">Guess · check · adjust</text>

  <!-- 模型 -->
  <rect x="722" y="120" width="236" height="220" rx="20" fill="#FFFFFF" stroke="#E0D6C6" stroke-width="3"/>
  <g transform="translate(840,192)">
    <circle r="30" fill="#F7C64B"/>
    <path d="M 0 -30 a 30 30 0 0 1 0 60" fill="#F2A65A"/>
    <circle cx="0" cy="-6" r="11" fill="#FFFFFF"/>
    <path d="M -8 -14 L -12 -24 L -2 -19 Z M 8 -14 L 12 -24 L 2 -19 Z" fill="#FFFFFF"/>
    <path d="M -22 26 L -30 44 L -12 36 Z" fill="#4A90D9"/>
    <path d="M 22 26 L 30 44 L 12 36 Z" fill="#4A90D9"/>
    <path d="M -30 -34 l 4 -8 l 3 8 l 8 2 l -7 4 l -1 9 l -5 -6 l -9 1 l 5 -7 z" fill="#F59E0B"/>
  </g>
  <text x="840" y="282" text-anchor="middle" font-size="19" font-weight="700" fill="#5FA968">Model</text>
  <text x="840" y="308" text-anchor="middle" font-size="13" fill="#8A7F72">The trained "cat sense"</text>

  <!-- 类比行 -->
  <text x="480" y="392" text-anchor="middle" font-size="14" fill="#9A8F80">Just like a child's —</text>
  <rect x="146" y="410" width="108" height="34" rx="17" fill="#EAF3FB"/>
  <text x="200" y="433" text-anchor="middle" font-size="14" font-weight="600" fill="#4A90D9">Textbook</text>
  <rect x="466" y="410" width="108" height="34" rx="17" fill="#FDF0DC"/>
  <text x="520" y="433" text-anchor="middle" font-size="14" font-weight="600" fill="#E8905A">Practice</text>
  <rect x="786" y="410" width="108" height="34" rx="17" fill="#EAF4EB"/>
  <text x="840" y="433" text-anchor="middle" font-size="14" font-weight="600" fill="#5FA968">Experience</text>
</svg>
