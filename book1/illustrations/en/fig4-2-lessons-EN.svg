<svg viewBox="0 0 900 470" xmlns="http://www.w3.org/2000/svg" font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei','Noto Sans SC',sans-serif">
  <rect width="900" height="470" fill="#FAF6EF"/>
  <text x="450" y="46" text-anchor="middle" font-size="24" font-weight="700" fill="#3D3229">The Two Classes a Chat AI Takes</text>
  <text x="450" y="72" text-anchor="middle" font-size="13.5" fill="#9A8F80">Figure 4-2 | First read everything, then learn to talk</text>

  <!-- 第一堂课 -->
  <rect x="70" y="104" width="340" height="280" rx="20" fill="#FFFFFF" stroke="#E0D6C6" stroke-width="3"/>
  <text x="240" y="146" text-anchor="middle" font-size="18" font-weight="700" fill="#4A90D9">Class One · Massive Reading</text>
  <g transform="translate(240,232)">
    <rect x="-62" y="10" width="124" height="22" rx="5" fill="#4A90D9"/>
    <rect x="-54" y="-14" width="108" height="22" rx="5" fill="#7FB4D9"/>
    <rect x="-58" y="-38" width="116" height="22" rx="5" fill="#A9CBE8"/>
    <path d="M 74 -30 a 30 30 0 1 1 -8 -42" stroke="#F59E0B" stroke-width="5" fill="none" stroke-linecap="round"/>
    <polygon points="80,-26 64,-30 74,-42" fill="#F59E0B"/>
  </g>
  <text x="240" y="322" text-anchor="middle" font-size="13.5" fill="#8A7F72">Reads nearly all the text online;</text>
  <text x="240" y="346" text-anchor="middle" font-size="13.5" fill="#8A7F72">billions of chain drills build the feel</text>

  <path d="M 422 244 h 44" stroke="#C9BCA6" stroke-width="4" stroke-linecap="round"/>
  <polygon points="474,244 458,236 458,252" fill="#C9BCA6"/>

  <!-- 第二堂课 -->
  <rect x="490" y="104" width="340" height="280" rx="20" fill="#FFFFFF" stroke="#E0D6C6" stroke-width="3"/>
  <text x="660" y="146" text-anchor="middle" font-size="18" font-weight="700" fill="#E8905A">Class Two · Human Tutoring</text>
  <g transform="translate(660,230)">
    <circle cx="-58" cy="-24" r="16" fill="#8A7F72"/>
    <path d="M -88 22 a 30 20 0 0 1 60 0 z" fill="#8A7F72"/>
    <rect x="-18" y="-38" width="96" height="30" rx="14" fill="#EAF4EB"/>
    <circle cx="0" cy="-23" r="8" fill="#5FA968"/>
    <path d="M -4 -23 l 3 4 l 6 -8" stroke="#FFFFFF" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="42" y="-17" text-anchor="middle" font-size="13" fill="#5FA968">+1</text>
    <rect x="-18" y="2" width="96" height="30" rx="14" fill="#FDEDE4"/>
    <circle cx="0" cy="17" r="8" fill="#E8734A"/>
    <path d="M -3 14 l 6 6 M 3 14 l -6 6" stroke="#FFFFFF" stroke-width="2.4" stroke-linecap="round"/>
    <text x="42" y="23" text-anchor="middle" font-size="13" fill="#E8734A">-1</text>
  </g>
  <text x="660" y="322" text-anchor="middle" font-size="13.5" fill="#8A7F72">Humans demonstrate good answers,</text>
  <text x="660" y="346" text-anchor="middle" font-size="13.5" fill="#8A7F72">then score its replies one by one</text>

  <text x="450" y="440" text-anchor="middle" font-size="13.5" fill="#9A8F80">Class Two is Chapter 3's "trial and reward" — good answers are its treats</text>
</svg>
