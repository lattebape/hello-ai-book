<svg viewBox="0 0 900 480" xmlns="http://www.w3.org/2000/svg" font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei','Noto Sans SC',sans-serif">
  <rect width="900" height="480" fill="#FAF6EF"/>
  <text x="450" y="44" text-anchor="middle" font-size="24" font-weight="700" fill="#3D3229">The Turing Test: Guess Who Is the Machine</text>
  <text x="450" y="70" text-anchor="middle" font-size="13.5" fill="#9A8F80">Figure 2-1 | The "imitation game" Turing imagined in 1950</text>

  <!-- 房间A：人 -->
  <rect x="120" y="96" width="220" height="146" rx="16" fill="#FFFFFF" stroke="#E0D6C6" stroke-width="2.5"/>
  <text x="230" y="122" text-anchor="middle" font-size="14" font-weight="600" fill="#8A7F72">Room A</text>
  <circle cx="230" cy="164" r="18" fill="#8A7F72"/>
  <path d="M 196 216 a 34 22 0 0 1 68 0 z" fill="#8A7F72"/>

  <!-- 房间B：机器 -->
  <rect x="560" y="96" width="220" height="146" rx="16" fill="#FFFFFF" stroke="#E0D6C6" stroke-width="2.5"/>
  <text x="670" y="122" text-anchor="middle" font-size="14" font-weight="600" fill="#8A7F72">Room B</text>
  <g transform="translate(670,184) scale(0.85)">
    <ellipse rx="38" ry="34" fill="#FFFFFF" stroke="#E0D6C6" stroke-width="3"/>
    <ellipse cy="-2" rx="24" ry="17" fill="#CFE9F8"/>
    <path d="M -13 -5 q 4.5 -5 9 0" stroke="#2C6E9E" stroke-width="2.4" fill="none" stroke-linecap="round"/>
    <path d="M 4 -5 q 4.5 -5 9 0" stroke="#2C6E9E" stroke-width="2.4" fill="none" stroke-linecap="round"/>
    <path d="M -5 4 q 5 4 10 0" stroke="#2C6E9E" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <line y1="-34" y2="-48" stroke="#B9AFA0" stroke-width="3" stroke-linecap="round"/>
    <circle cy="-53" r="5.5" fill="#F59E0B"/>
  </g>

  <!-- 屏障 -->
  <line x1="110" y1="272" x2="790" y2="272" stroke="#C9BCA6" stroke-width="3" stroke-dasharray="9 8"/>
  <rect x="360" y="258" width="180" height="28" rx="14" fill="#F1E7D6"/>
  <text x="450" y="277" text-anchor="middle" font-size="13" fill="#8A7F72">Text only — no peeking</text>

  <!-- 对话虚线与气泡 -->
  <path d="M 410 336 C 340 320 275 300 240 250" stroke="#4A90D9" stroke-width="2.5" stroke-dasharray="6 6" fill="none"/>
  <polygon points="240,250 236,264 250,258" fill="#4A90D9"/>
  <rect x="292" y="292" width="44" height="28" rx="13" fill="#EAF3FB"/>
  <text x="314" y="311" text-anchor="middle" font-size="15" font-weight="700" fill="#4A90D9">?</text>

  <path d="M 490 336 C 560 320 625 300 660 250" stroke="#E8734A" stroke-width="2.5" stroke-dasharray="6 6" fill="none"/>
  <polygon points="660,250 664,264 650,258" fill="#E8734A"/>
  <rect x="564" y="292" width="44" height="28" rx="13" fill="#FDEDE4"/>
  <text x="586" y="312" text-anchor="middle" font-size="15" font-weight="700" fill="#E8734A">…</text>

  <!-- 提问者：小悠上半身 -->
  <g transform="translate(450,404)">
    <rect x="-28" y="-72" width="56" height="74" rx="22" fill="#F7C64B"/>
    <circle cy="-102" r="30" fill="#FFCFA8"/>
    <path d="M -30 -102 a 30 30 0 0 1 60 0 l 0 7 q -7 -7 -14 -3 q -7 -8 -16 -2 q -9 -7 -16 2 q -7 -4 -14 4 z" fill="#2E2A28"/>
    <circle cx="-10" cy="-94" r="2.6" fill="#2E2A28"/>
    <circle cx="10" cy="-94" r="2.6" fill="#2E2A28"/>
    <path d="M -7 -85 q 7 6 14 0" stroke="#2E2A28" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <ellipse cx="-19" cy="-88" rx="4.5" ry="3" fill="#F7A98C" opacity="0.55"/>
    <ellipse cx="19" cy="-88" rx="4.5" ry="3" fill="#F7A98C" opacity="0.55"/>
  </g>
  <text x="450" y="428" text-anchor="middle" font-size="14" font-weight="600" fill="#3D3229">The interrogator (human)</text>

  <text x="450" y="462" text-anchor="middle" font-size="14" fill="#8A7F72">Still can't tell which room holds the machine? The machine passes.</text>
</svg>
