<svg viewBox="0 0 960 430" xmlns="http://www.w3.org/2000/svg" font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei','Noto Sans SC',sans-serif">
  <rect width="960" height="430" fill="#FAF6EF"/>

  <text x="480" y="48" text-anchor="middle" font-size="26" font-weight="700" fill="#3D3229">How Much AI Hides in Your Day?</text>
  <text x="480" y="76" text-anchor="middle" font-size="14" fill="#9A8F80">Figure 1-1 | AI moments in one ordinary day</text>

  <line x1="70" y1="225" x2="890" y2="225" stroke="#E6DCC9" stroke-width="5" stroke-linecap="round"/>

  <!-- 07:00 Face unlock（上） -->
  <g transform="translate(120,225)">
    <line y1="-24" y2="-46" stroke="#F59E0B" stroke-width="2" opacity="0.5"/>
    <circle r="24" fill="#F59E0B"/>
    <circle cx="-7" cy="-4" r="2.4" fill="#FFFFFF"/>
    <circle cx="7" cy="-4" r="2.4" fill="#FFFFFF"/>
    <path d="M -8 4 Q 0 12 8 4" stroke="#FFFFFF" stroke-width="2.6" fill="none" stroke-linecap="round"/>
    <text y="-104" text-anchor="middle" font-size="16" font-weight="700" fill="#F59E0B">07:00</text>
    <text y="-80" text-anchor="middle" font-size="15" font-weight="600" fill="#3D3229">Face unlock</text>
    <text y="-58" text-anchor="middle" font-size="13" fill="#8A7F72">Knows your face at a glance</text>
  </g>

  <!-- 08:30 Navigation（下） -->
  <g transform="translate(270,225)">
    <line y1="24" y2="44" stroke="#4A90D9" stroke-width="2" opacity="0.5"/>
    <circle r="24" fill="#4A90D9"/>
    <path d="M 0 12 C 0 12 -10 2 -10 -4 A 10 10 0 0 1 10 -4 C 10 2 0 12 0 12 Z" fill="#FFFFFF"/>
    <circle cy="-4" r="3.4" fill="#4A90D9"/>
    <text y="62" text-anchor="middle" font-size="16" font-weight="700" fill="#4A90D9">08:30</text>
    <text y="86" text-anchor="middle" font-size="15" font-weight="600" fill="#3D3229">Navigation</text>
    <text y="108" text-anchor="middle" font-size="13" fill="#8A7F72">Predicts the fastest route</text>
  </g>

  <!-- 12:00 Food suggestions（上） -->
  <g transform="translate(420,225)">
    <line y1="-24" y2="-46" stroke="#5FA968" stroke-width="2" opacity="0.5"/>
    <circle r="24" fill="#5FA968"/>
    <g transform="translate(0,2)">
      <path d="M -11 -1 A 11 11 0 0 0 11 -1 Z" fill="#FFFFFF"/>
      <rect x="-6" y="10" width="12" height="2.6" rx="1.3" fill="#FFFFFF"/>
      <path d="M -4 -6 q 2.5 -3 0 -6" stroke="#FFFFFF" stroke-width="2" fill="none" stroke-linecap="round"/>
      <path d="M 4 -6 q 2.5 -3 0 -6" stroke="#FFFFFF" stroke-width="2" fill="none" stroke-linecap="round"/>
    </g>
    <text y="-104" text-anchor="middle" font-size="16" font-weight="700" fill="#5FA968">12:00</text>
    <text y="-80" text-anchor="middle" font-size="15" font-weight="600" fill="#3D3229">Food suggestions</text>
    <text y="-58" text-anchor="middle" font-size="13" fill="#8A7F72">Guesses what you crave</text>
  </g>

  <!-- 15:00 Predictive typing（下） -->
  <g transform="translate(570,225)">
    <line y1="24" y2="44" stroke="#E8734A" stroke-width="2" opacity="0.5"/>
    <circle r="24" fill="#E8734A"/>
    <rect x="-13" y="-8" width="26" height="16" rx="8" fill="#FFFFFF"/>
    <circle cx="-6" r="2.2" fill="#E8734A"/>
    <circle r="2.2" fill="#E8734A"/>
    <circle cx="6" r="2.2" fill="#E8734A"/>
    <text y="62" text-anchor="middle" font-size="16" font-weight="700" fill="#E8734A">15:00</text>
    <text y="86" text-anchor="middle" font-size="15" font-weight="600" fill="#3D3229">Predictive typing</text>
    <text y="108" text-anchor="middle" font-size="13" fill="#8A7F72">Guesses your next word</text>
  </g>

  <!-- 20:00 Video feed（上） -->
  <g transform="translate(720,225)">
    <line y1="-24" y2="-46" stroke="#8B6FC0" stroke-width="2" opacity="0.5"/>
    <circle r="24" fill="#8B6FC0"/>
    <polygon points="-6,-9 10,0 -6,9" fill="#FFFFFF"/>
    <text y="-104" text-anchor="middle" font-size="16" font-weight="700" fill="#8B6FC0">20:00</text>
    <text y="-80" text-anchor="middle" font-size="15" font-weight="600" fill="#3D3229">Video feed</text>
    <text y="-58" text-anchor="middle" font-size="13" fill="#8A7F72">Learns you with every swipe</text>
  </g>

  <!-- 22:30 Photo albums（下） -->
  <g transform="translate(870,225)">
    <line y1="24" y2="44" stroke="#3AA6A0" stroke-width="2" opacity="0.5"/>
    <circle r="24" fill="#3AA6A0"/>
    <rect x="-12" y="-9" width="24" height="18" rx="3" fill="none" stroke="#FFFFFF" stroke-width="2.4"/>
    <circle cx="-5" cy="-3.5" r="2" fill="#FFFFFF"/>
    <path d="M -9 5 L -3 -1 L 1 3 L 5 -2 L 9 5" stroke="#FFFFFF" stroke-width="2.2" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
    <text y="62" text-anchor="middle" font-size="16" font-weight="700" fill="#3AA6A0">22:30</text>
    <text y="86" text-anchor="middle" font-size="15" font-weight="600" fill="#3D3229">Photo albums</text>
    <text y="108" text-anchor="middle" font-size="13" fill="#8A7F72">Sorts faces automatically</text>
  </g>

  <text x="480" y="398" text-anchor="middle" font-size="13.5" fill="#9A8F80">...and that is just the tip of the iceberg: spam filters, photo touch-ups, voice assistants, live translation</text>
</svg>
