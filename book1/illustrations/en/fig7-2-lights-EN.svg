<svg viewBox="0 0 960 548" xmlns="http://www.w3.org/2000/svg" font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei','Noto Sans SC',sans-serif">
  <rect width="960" height="548" fill="#FAF6EF"/>
  <text x="480" y="46" text-anchor="middle" font-size="24" font-weight="700" fill="#3D3229">A Traffic Light for Tasks</text>
  <text x="480" y="72" text-anchor="middle" font-size="13.5" fill="#9A8F80">Figure 7-2 | What to hand over, what to hold on to</text>

  <!-- 绿灯 -->
  <rect x="42" y="104" width="272" height="368" rx="18" fill="#FFFFFF" stroke="#5FA968" stroke-width="3"/>
  <rect x="62" y="122" width="232" height="52" rx="26" fill="#EAF4EB"/>
  <circle cx="90" cy="148" r="15" fill="#5FA968"/>
  <path d="M 82 148 l 6 7 l 11 -13" stroke="#FFFFFF" stroke-width="3.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="114" y="155" font-size="16.5" font-weight="700" fill="#3E7D4B">Green · Hand it over</text>
  <g font-size="14" fill="#3D3229">
    <circle cx="80" cy="209" r="4" fill="#5FA968"/><text x="96" y="214">First drafts</text>
    <circle cx="80" cy="247" r="4" fill="#5FA968"/><text x="96" y="252">Brainstorming ideas</text>
    <circle cx="80" cy="285" r="4" fill="#5FA968"/><text x="96" y="290">Rewriting & polishing</text>
    <circle cx="80" cy="323" r="4" fill="#5FA968"/><text x="96" y="328">Translation</text>
    <circle cx="80" cy="361" r="4" fill="#5FA968"/><text x="96" y="366">Shrinking long texts</text>
  </g>
  <line x1="62" y1="396" x2="294" y2="396" stroke="#EADFCC" stroke-width="1.5"/>
  <text x="178" y="428" text-anchor="middle" font-size="12" fill="#8A7F72">In common: easy to judge, cheap to fix</text>

  <!-- 黄灯 -->
  <rect x="344" y="104" width="272" height="368" rx="18" fill="#FFFFFF" stroke="#F59E0B" stroke-width="3"/>
  <rect x="364" y="122" width="232" height="52" rx="26" fill="#FDF3DC"/>
  <circle cx="392" cy="148" r="15" fill="#F59E0B"/>
  <rect x="389" y="138" width="6" height="13" rx="3" fill="#FFFFFF"/>
  <circle cx="392" cy="157" r="3" fill="#FFFFFF"/>
  <text x="414" y="155" font-size="15" font-weight="700" fill="#B45309">Yellow · Use with care</text>
  <g font-size="14" fill="#3D3229">
    <circle cx="382" cy="209" r="4" fill="#F59E0B"/><text x="398" y="214">Checking facts & data</text>
    <circle cx="382" cy="247" r="4" fill="#F59E0B"/><text x="398" y="252">Intro to a new field</text>
    <circle cx="382" cy="285" r="4" fill="#F59E0B"/><text x="398" y="290">Reading long docs for you</text>
  </g>
  <line x1="364" y1="396" x2="596" y2="396" stroke="#EADFCC" stroke-width="1.5"/>
  <text x="480" y="428" text-anchor="middle" font-size="12" fill="#8A7F72">In common: mostly right, errors hide</text>

  <!-- 红灯 -->
  <rect x="646" y="104" width="272" height="368" rx="18" fill="#FFFFFF" stroke="#E8734A" stroke-width="3"/>
  <rect x="666" y="122" width="232" height="52" rx="26" fill="#FDEDE4"/>
  <circle cx="694" cy="148" r="15" fill="#E8734A"/>
  <path d="M 687 141 L 701 155 M 701 141 L 687 155" stroke="#FFFFFF" stroke-width="3.4" stroke-linecap="round"/>
  <text x="718" y="155" font-size="16.5" font-weight="700" fill="#B4472A">Red · Don't delegate</text>
  <g font-size="14" fill="#3D3229">
    <circle cx="684" cy="209" r="4" fill="#E8734A"/><text x="700" y="214">Health, law & money calls</text>
    <circle cx="684" cy="247" r="4" fill="#E8734A"/><text x="700" y="252">Safety-critical actions</text>
    <circle cx="684" cy="285" r="4" fill="#E8734A"/><text x="700" y="290">Life choices made for you</text>
  </g>
  <line x1="666" y1="396" x2="898" y2="396" stroke="#EADFCC" stroke-width="1.5"/>
  <text x="782" y="428" text-anchor="middle" font-size="12" fill="#8A7F72">In common: high stakes, your liability</text>

  <text x="480" y="522" text-anchor="middle" font-size="13.5" fill="#9A8F80">Rule of thumb: the easier to check and the cheaper the mistake, the more you can let go — the reverse, the tighter you hold</text>
</svg>
