<svg viewBox="0 0 960 520" xmlns="http://www.w3.org/2000/svg" font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei','Noto Sans SC',sans-serif">
  <rect width="960" height="520" fill="#FAF6EF"/>
  <text x="480" y="46" text-anchor="middle" font-size="24" font-weight="700" fill="#3D3229">Seventy Years of AI: A Roller-Coaster Curve</text>
  <text x="480" y="72" text-anchor="middle" font-size="13.5" fill="#9A8F80">Figure 2-3 | Two booms, two winters — then all three fuels ignite</text>

  <!-- 寒冬区域 -->
  <rect x="262" y="150" width="86" height="280" rx="14" fill="#BFDCF0" opacity="0.32"/>
  <rect x="476" y="150" width="84" height="280" rx="14" fill="#BFDCF0" opacity="0.32"/>
  <g stroke="#7FB4D9" stroke-width="2.5" stroke-linecap="round">
    <path d="M 305 172 v 20 M 296 177 l 18 10 M 314 177 l -18 10"/>
    <path d="M 518 172 v 20 M 509 177 l 18 10 M 527 177 l -18 10"/>
  </g>

  <!-- 基线 -->
  <line x1="60" y1="430" x2="900" y2="430" stroke="#E6DCC9" stroke-width="3" stroke-linecap="round"/>

  <!-- 过山车曲线 -->
  <path d="M 60 348
           C 120 345 155 210 205 202
